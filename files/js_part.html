/* ── DATABASE (localStorage) ── */
const DB={
  g(k){try{return JSON.parse(localStorage.getItem("vd_"+k)||"[]")}catch{return[]}},
  s(k,v){localStorage.setItem("vd_"+k,JSON.stringify(v))},
  addOrder(o){const a=DB.g("orders");a.push(o);DB.s("orders",a)},
  addPayment(p){const a=DB.g("payments");a.push(p);DB.s("payments",a)},
  addUser(u){const a=DB.g("users");if(!a.find(x=>x.mobile===u.mobile)){a.push(u);DB.s("users",a)}},
  addAddr(a){const arr=DB.g("addresses");arr.push(a);DB.s("addresses",arr)},
  saveAddr(a){localStorage.setItem("vl_addr",JSON.stringify(a))},
  loadAddr(){try{return JSON.parse(localStorage.getItem("vl_addr")||"null")}catch{return null}}
};

/* ── STATE ── */
let S={
  page:"home",pid:null,tab:"ing",cat:"All",
  cart:JSON.parse(localStorage.getItem("vc")||"[]"),
  selVol:{},selQty:{},confId:null,scrolled:false,

const cCount=()=>S.cart.reduce((a,i)=>a+i.qty,0);
const cSub=()=>S.cart.reduce((a,i)=>a+i.price*i.qty,0);
function saveCart(){localStorage.setItem("vc",JSON.stringify(S.cart))}

function addCart(p,vol,price,qty=1){
  const ex=S.cart.find(i=>i.id===p.id&&i.vol===vol);
  if(ex)ex.qty+=qty;
  else S.cart.push({id:p.id,name:p.name,emoji:p.emoji,vol,price,qty});
  saveCart();toast("🛒 "+p.name+" added!");render();
}
function remCart(id,vol){S.cart=S.cart.filter(i=>!(i.id===id&&i.vol===vol));saveCart();render()}
function updQty(id,vol,q){const i=S.cart.find(x=>x.id===id&&x.vol===vol);if(i){i.qty=Math.max(1,q);saveCart();render()}}

/* ── SPLASH ── */
let _si;
function initSplash(){
  let c=5;
  const prog=document.getElementById("spl-prog");
  const cnt=document.getElementById("scount");
  if(prog){setTimeout(()=>{prog.style.width="100%"},80);}
  _si=setInterval(()=>{
    c--;
    if(cnt)cnt.textContent=c;
    if(c<=0)closeSplash();
  },1000);
}
function closeSplash(){
  clearInterval(_si);
  const sp=document.getElementById("splash");
  if(sp&&!sp.classList.contains("gone")){
    sp.classList.add("fade");
    setTimeout(()=>sp.classList.add("gone"),900);
  }
}

/* ── TOAST ── */
let _tt;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),3200);
}

function selVol(id,vol,price){S.selVol[id]=vol;render()}
function chgQty(id,d){S.selQty[id]=Math.max(1,(S.selQty[id]||1)+d);render()}

  document.querySelector(".pm-tabs").style.display="flex";

function closePay(e){
  if(!e||e.target===document.getElementById("pay-ov"))
    document.getElementById("pay-ov").classList.remove("open");
}
function pmTab(tab,el){
  S.pmTab=tab;
  document.querySelectorAll(".pm-panel").forEach(p=>p.classList.remove("on"));
  document.getElementById("pm-"+tab).classList.add("on");
  document.querySelectorAll(".pm-tab").forEach(t=>t.classList.remove("on"));
  el.classList.add("on");
  document.getElementById("otp-screen").style.display="none";

function selUPI(el,app){
  document.querySelectorAll(".ua").forEach(a=>a.classList.remove("on"));
  el.classList.add("on");S.selUPIApp=app;
  const inp=document.getElementById("upi-inp");
  if(inp)inp.placeholder=app+"@yourbank";
}
function chkUPI(el){
  const v=el.value.trim();const m=document.getElementById("upi-msg");if(!m)return;
  const ok=/^[a-zA-Z0-9._-]+@[a-zA-Z]+$/.test(v)||/^\d{10}@/.test(v);
  if(v.length>3){m.className="upi-val "+(ok?"ok":"err");m.textContent=ok?"✓ Valid UPI ID":"✗ Format: name@gpay or number@paytm"}
  else m.textContent="";
}
function selBank(el,bank){
  document.querySelectorAll(".bank-item").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");S.selBank=bank;
}
function fmtCard(el){
  let v=el.value.replace(/\D/g,"").slice(0,16);
  v=v.match(/.{1,4}/g)?.join("  ")||v;el.value=v;
  const n=v.replace(/\s/g,"").padEnd(16,"•");
  document.getElementById("cp-num").textContent=n.slice(0,4)+"  "+n.slice(4,8)+"  "+n.slice(8,12)+"  "+n.slice(12,16);
}
function fmtExp(el){
  let v=el.value.replace(/\D/g,"");
  if(v.length>2)v=v.slice(0,2)+" / "+v.slice(2,4);
  el.value=v;document.getElementById("cp-exp").textContent=el.value||"MM/YY";
}
function detectNet(el){
  const v=el.value.replace(/\D/g,"");const cp=document.getElementById("card-prev");
  if(v.startsWith("4"))cp.style.background="linear-gradient(135deg,#0d47a1,#1565c0)";
  else if(v.startsWith("5"))cp.style.background="linear-gradient(135deg,#b71c1c,#c62828)";
  else if(v.startsWith("6"))cp.style.background="linear-gradient(135deg,#1b5e20,#2e7d32)";
  else cp.style.background="linear-gradient(135deg,#1a5c2a,#2d7a42)";
}
function nxt(el,idx){
  el.value=el.value.replace(/\D/g,"");
  if(el.value&&idx<5)document.getElementById("o"+(idx+1))?.focus();
}
function getOTP(){return[0,1,2,3,4,5].map(i=>document.getElementById("o"+i)?.value||"").join("")}
let _otpT;
function startOTPTimer(){
  let s=30;
  document.getElementById("otp-timer").style.display="block";
  document.getElementById("otp-resend").style.display="none";
  document.getElementById("otp-cd").textContent=30;
  clearInterval(_otpT);
  _otpT=setInterval(()=>{
    s--;
    const el=document.getElementById("otp-cd");if(el)el.textContent=s;
    if(s<=0){clearInterval(_otpT);document.getElementById("otp-timer").style.display="none";document.getElementById("otp-resend").style.display="block"}
  },1000);
}
function resendOTP(){
  [0,1,2,3,4,5].forEach(i=>{const el=document.getElementById("o"+i);if(el)el.value=""});
  document.getElementById("o0")?.focus();toast("📨 New OTP sent!");startOTPTimer();
}
function cancelOTP(){
  clearInterval(_otpT);
  document.getElementById("otp-screen").style.display="none";
  document.querySelector(".pm-tabs").style.display="flex";
  document.querySelectorAll(".pm-panel").forEach(p=>p.classList.toggle("on",p.id==="pm-"+S.pmTab));
  document.getElementById("main-pay-btn").style.display="block";
}
function showOTP(dest){
  document.querySelectorAll(".pm-panel").forEach(p=>p.classList.remove("on"));
  document.querySelector(".pm-tabs").style.display="none";
  document.getElementById("main-pay-btn").style.display="none";
  document.getElementById("otp-screen").style.display="block";
  document.getElementById("otp-dest").textContent=dest;
  [0,1,2,3,4,5].forEach(i=>{const el=document.getElementById("o"+i);if(el)el.value=""});
  document.getElementById("o0")?.focus();
  startOTPTimer();
}
function showProc(){document.getElementById("proc-ov").classList.add("open")}
function hideProc(){document.getElementById("proc-ov").classList.remove("open")}
function animProc(steps){
  steps.forEach((s,i)=>{
    setTimeout(()=>{
      document.querySelectorAll(".p-step").forEach((el,j)=>{
        el.classList.toggle("done",j<i);el.classList.toggle("active",j===i);
      });
      document.getElementById("proc-text").textContent=s[0];
      document.getElementById("proc-sub").textContent=s[1];
    },i*750);
  });
}

/* ── PAYMENT INITIATION ── */
function initPay(){
  const tab=S.pmTab;
  if(tab==="upi"){
    const upi=document.getElementById("upi-inp")?.value.trim();
    if(!upi&&!S.selUPIApp){toast("❌ Please select a UPI app or enter UPI ID");return}
    showProc();
    animProc([
      ["Initiating UPI collect request...","Connecting to UPI network"],
      ["Sending to "+(S.selUPIApp||"your UPI app")+"...","Open your app to approve"],
      ["Waiting for approval...","Please approve in your UPI app"],
      ["Setting up OTP verification...","Almost there"]
    ]);
    setTimeout(()=>{hideProc();showOTP(upi||S.selUPIApp+"@upi")},3500);
  }
  else if(tab==="card"){
    const num=document.getElementById("card-num")?.value.replace(/\D/g,"");
    const name=document.getElementById("card-name")?.value.trim();
    const exp=document.getElementById("card-exp")?.value.trim();
    const cvv=document.getElementById("card-cvv")?.value.trim();
    if(!num||num.length<16){toast("❌ Enter valid 16-digit card number");document.getElementById("card-num")?.classList.add("err");return}
    if(!name){toast("❌ Enter card holder name");return}
    if(!exp||exp.length<4){toast("❌ Enter valid expiry date");return}
    if(!cvv||cvv.length<3){toast("❌ Enter CVV");return}
    document.getElementById("card-num")?.classList.remove("err");
    showProc();
    animProc([
      ["Encrypting card details...","256-bit SSL encryption active"],
      ["Connecting to bank gateway...","Establishing secure channel"],
      ["Verifying card...","Checking with issuing bank"],
      ["Sending 3D Secure OTP...","OTP sent to registered mobile"]
    ]);
    setTimeout(()=>{hideProc();showOTP("card ending "+num.slice(-4)+" (registered mobile)")},3500);
  }
  else if(tab==="nb"){
    if(!S.selBank){toast("❌ Please select your bank");return}
    showProc();
    animProc([
      ["Connecting to "+S.selBank+"...","Establishing secure bank connection"],
      ["Redirecting to bank portal...","Opening "+S.selBank+" Net Banking"],
      ["Loading authentication page...","Bank OTP will be sent to you"],
      ["Preparing secure redirect...","Almost ready"]
    ]);
    setTimeout(()=>{hideProc();showOTP("your "+S.selBank+" registered mobile")},3500);
  }
  else if(tab==="cod"){
    showProc();
    animProc([
      ["Verifying delivery address...","Checking pin code serviceability"],
      ["Confirming stock availability...","Checking product stock"],
      ["Creating COD order...","Placing your order securely"],
      ["Finalising order details...","Almost done!"]
    ]);
    setTimeout(()=>processSuccess(),3200);
  }
  else if(tab==="wa"){
    showProc();
    animProc([
      ["Preparing payment link...","Generating secure UPI link"],
      ["Encrypting payment details...","Creating WhatsApp message"],
      ["Sending to WhatsApp...","Link will arrive shortly"],
      ["Order confirmed...","Finalising your order"]
    ]);
    setTimeout(()=>processSuccess(),3200);
  }
}

function verifyOTP(){
  const otp=getOTP();
  if(otp.length<6){toast("❌ Please enter all 6 OTP digits");return}
  clearInterval(_otpT);showProc();
  animProc([
    ["Verifying OTP...","Checking with authentication server"],
    ["OTP validated ✓","Authentication successful"],
    ["Processing payment...","Debiting amount securely"],
    ["Confirming order...","Creating your order record"]
  ]);
  setTimeout(()=>processSuccess(),3000);
}

function processSuccess(){
  hideProc();
  const sub=cSub();const del=sub>=499?0:50;const cod=S.pmTab==="cod"?30:0;const tot=sub+del+cod;
  const ordId="VID"+Date.now().toString().slice(-8);
  const d=new Date();d.setDate(d.getDate()+3);
  const addr=DB.loadAddr()||{};
  const txnId="RZP_"+Math.random().toString(36).slice(2,12).toUpperCase();
  const uId="USR_"+Date.now();const aId="ADDR_"+Date.now();
  const order={
    order_id:ordId,user_id:uId,address_id:aId,
    items:[...S.cart],address:{...addr},
    subtotal:sub,delivery_fee:del,cod_fee:cod,grand_total:tot,

/* ── MAP FUNCTIONS ── */
function getAddrFromForm(){
  return{
    l1:document.getElementById("l1")?.value||"",
    l2:document.getElementById("l2")?.value||"",
    city:document.getElementById("city")?.value||"",
    state:document.getElementById("state")?.value||"",
    pin:document.getElementById("pin")?.value||""
  };
}
function useGPS(){
  if(!navigator.geolocation){toast("❌ Geolocation not supported in this browser");return}
  toast("📡 Getting your precise GPS location...");
  navigator.geolocation.getCurrentPosition(
    pos=>{
      S.userLat=pos.coords.latitude;S.userLng=pos.coords.longitude;S.mapSrc="gps";
      toast("✅ GPS captured: "+S.userLat.toFixed(5)+", "+S.userLng.toFixed(5));
      const tag=document.getElementById("gps-tag");
      if(tag){tag.style.display="inline-flex";tag.innerHTML="📡 GPS: "+S.userLat.toFixed(5)+", "+S.userLng.toFixed(5)}
    },
    err=>{
      const msgs={1:"Permission denied. Please allow location access.",2:"Position unavailable.",3:"Request timed out."};
      toast("❌ "+(msgs[err.code]||"Location error"));
    },
    {enableHighAccuracy:true,timeout:12000}
  );
}
function openGoogleMaps(){
  const a=getAddrFromForm();
  const q=encodeURIComponent([a.l1,a.l2,a.city,a.state,a.pin].filter(Boolean).join(", "));
  window.open("https://www.google.com/maps/search/?api=1&query="+q,"_blank");
  toast("🗺️ Opening Google Maps...");
}

  const a=getAddrFromForm();

function toPay(){
  const fn=document.getElementById("fn")?.value.trim();
  const ln=document.getElementById("ln")?.value.trim();
  const mob=document.getElementById("mob")?.value.trim();
  const l1=document.getElementById("l1")?.value.trim();
  const city=document.getElementById("city")?.value.trim();
  const pin=document.getElementById("pin")?.value.trim();
  const state=document.getElementById("state")?.value;
  const l2=document.getElementById("l2")?.value.trim();
  const note=document.getElementById("note")?.value.trim();
  if(!fn||!ln||!mob||!l1||!city||!pin||!state){toast("❌ Please fill all required (*) fields");return}
  if(!/^\d{10}$/.test(mob.replace(/\D/g,""))){toast("❌ Please enter a valid 10-digit mobile number");return}
  if(!/^\d{6}$/.test(pin)){toast("❌ Please enter a valid 6-digit PIN code");return}
  DB.saveAddr({fn,ln,mob,l1,l2,city,pin,state,note,lat:S.userLat,lng:S.userLng,mapSource:S.mapSrc||"manual"});
  const sub=cSub();const del=sub>=499?0:50;
  openPay(sub+del);
}

/* ── MAIN RENDER ── */
function render(){
  const app=document.getElementById("app");
  if(S.page==="home")      app.innerHTML=homeHTML();
  else if(S.page==="product")  app.innerHTML=productHTML();
  else if(S.page==="cart")     app.innerHTML=cartHTML();
  else if(S.page==="confirm")  app.innerHTML=confirmHTML();
}

/* Scroll nav shadow */
window.addEventListener("scroll",()=>{
  const was=S.scrolled;
  S.scrolled=window.scrollY>50;
  if(was!==S.scrolled){
    const nav=document.querySelector(".nav");
    if(nav)nav.classList.toggle("scrolled",S.scrolled);
  }
},{passive:true});

/* Bootstrap */
render();
if(document.readyState==="loading")
  document.addEventListener("DOMContentLoaded",initSplash);
else
  initSplash();
</script>

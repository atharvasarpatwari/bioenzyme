<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vidhatri — Bio Enzyme Natural Products</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Nunito:wght@300;400;600;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#1a5c2a;--g2:#2d7a42;--g3:#3da056;--g4:#c8f0d0;--g5:#eaf7ed;
  --gold:#c8940a;--gold2:#f0c040;--gold3:#fff8e1;
  --cream:#fdfaf3;--cream2:#f4edda;--cream3:#e8d9b0;
  --brown:#4a2c0a;--brown2:#6b3f10;
  --text:#1a1a1a;--text2:#444;--text3:#777;--text4:#bbb;
  --white:#fff;--border:#e0d4b8;--red:#e53935;
  --sh:0 2px 16px rgba(26,92,42,.10);--sh2:0 8px 40px rgba(26,92,42,.18);--sh3:0 20px 60px rgba(26,92,42,.22);
  --r:8px;--r2:14px;--r3:22px;--r4:36px;
}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.15}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--g3);border-radius:3px}

/* ══════ SPLASH ══════ */
#splash{
  position:fixed;inset:0;z-index:9999;cursor:pointer;
  background:#f0e8d8;overflow:hidden;
  display:flex;align-items:stretch;
}
#splash img{
  width:100%;height:100%;
  object-fit:cover;object-position:center center;
  display:block;flex:1;
}
#splash-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 45%,rgba(50,25,5,.55) 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding-bottom:3.5rem;gap:.9rem;
}
.spl-btn{
  background:rgba(255,255,255,.95);
  color:var(--brown);
  border:2px solid rgba(160,120,40,.45);
  border-radius:50px;
  padding:.8rem 2.8rem;
  font-family:'Nunito',sans-serif;
  font-weight:900;font-size:1.05rem;
  cursor:pointer;letter-spacing:.07em;
  box-shadow:0 8px 32px rgba(0,0,0,.28);
  animation:splpulse 2.2s ease-in-out infinite;
  transition:.2s;
}
.spl-btn:hover{background:#fff;transform:scale(1.04)}
@keyframes splpulse{0%,100%{transform:scale(1);box-shadow:0 8px 32px rgba(0,0,0,.28)}50%{transform:scale(1.035);box-shadow:0 12px 44px rgba(0,0,0,.38)}}
.spl-sub{
  color:rgba(255,255,255,.88);
  font-size:.82rem;font-weight:700;
  letter-spacing:.07em;text-align:center;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
}
.spl-bar{
  width:160px;height:3px;
  background:rgba(255,255,255,.22);
  border-radius:2px;overflow:hidden;
}
.spl-prog{
  height:100%;
  background:linear-gradient(90deg,var(--gold2),#fff);
  border-radius:2px;width:0%;
  transition:width 5s linear;
}
#splash.fade{
  opacity:0;transform:scale(1.04);
  transition:opacity .85s ease,transform .85s ease;
  pointer-events:none;
}
#splash.gone{display:none}

/* ══════ TOAST ══════ */
#toast{
  position:fixed;bottom:1.5rem;left:50%;
  transform:translateX(-50%) translateY(120px);
  background:var(--g1);color:#fff;padding:.7rem 1.8rem;
  border-radius:50px;font-size:.85rem;font-weight:700;
  z-index:9997;transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;box-shadow:var(--sh2);pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ══════ TOPBAR ══════ */
.topbar{
  background:linear-gradient(90deg,var(--g1),var(--g2),var(--g1));
  background-size:200%;animation:shimmer 5s linear infinite;
  color:#fff;text-align:center;padding:.34rem 1rem;
  font-size:.74rem;font-weight:600;letter-spacing:.04em;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.topbar a{color:var(--gold2);text-decoration:underline;margin-left:.4rem}

/* ══════ NAV ══════ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:900;
  background:rgba(253,250,243,.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1.5px solid var(--border);transition:.3s;
}
.nav.scrolled{box-shadow:var(--sh2)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:.62rem 3vw;gap:1rem}
.logo{display:flex;align-items:center;gap:.55rem;cursor:pointer;flex-shrink:0}
.logo-mark{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--g1),var(--g3));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;box-shadow:0 3px 10px rgba(26,92,42,.3);
}
.logo-name{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:900;color:var(--g1);line-height:1}
.logo-sub{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);display:block;font-family:'Nunito',sans-serif;font-weight:600}
.nav-links{display:flex;gap:.15rem;overflow-x:auto;scrollbar-width:none}
.nav-link{padding:.36rem .82rem;font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);cursor:pointer;border-radius:50px;white-space:nowrap;transition:.2s;border:1.5px solid transparent}
.nav-link:hover,.nav-link.on{background:var(--g1);color:#fff}
.nav-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.nav-icon{position:relative;width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-size:1.1rem;transition:.2s;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--g1)}
.nav-icon:hover{background:var(--g4)}
.n-badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;width:17px;height:17px;border-radius:50%;font-size:.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid var(--cream)}

/* ══════ BUTTONS ══════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;font-weight:800;font-size:.85rem;border-radius:50px;transition:all .22s;cursor:pointer;padding:.65rem 1.5rem;border:2px solid transparent;font-family:'Nunito',sans-serif;letter-spacing:.02em;text-decoration:none}
.btn-green{background:var(--g1);color:#fff;border-color:var(--g1)}.btn-green:hover{background:var(--brown);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--g1);border-color:var(--g1)}.btn-outline:hover{background:var(--g1);color:#fff;transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#e8aa20);color:#fff}.btn-gold:hover{background:var(--brown);transform:translateY(-1px)}
.btn-white{background:#fff;color:var(--g1);border-color:#fff}.btn-white:hover{background:var(--g4)}
.btn-gradient{background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;border:none}.btn-gradient:hover{background:linear-gradient(135deg,var(--brown),var(--g1));transform:translateY(-1px)}
.btn-sm{padding:.38rem .9rem;font-size:.74rem}.btn-lg{padding:.85rem 2rem;font-size:.95rem}.btn-xl{padding:1rem 2.4rem;font-size:1rem}.btn-full{width:100%}

/* ══════ HERO ══════ */
.hero{padding:100px 4vw 4rem;min-height:92vh;display:grid;grid-template-columns:1.1fr .9fr;align-items:center;gap:2.5rem;background:linear-gradient(150deg,#f0faf4 0%,var(--cream2) 55%,#ede0c4 100%);position:relative;overflow:hidden}
.hbb{position:absolute;border-radius:50%;pointer-events:none}
.hbb1{width:500px;height:500px;background:radial-gradient(circle,rgba(61,160,86,.15),transparent);top:-120px;right:-80px}
.hbb2{width:350px;height:350px;background:radial-gradient(circle,rgba(240,192,64,.12),transparent);bottom:-80px;left:-60px}
.hero-pill{display:inline-flex;align-items:center;gap:.45rem;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;padding:.3rem .95rem;border-radius:50px;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem;box-shadow:0 4px 16px rgba(26,92,42,.25)}
.hero-script{font-family:'Caveat',cursive;font-size:1.6rem;color:var(--gold);margin-bottom:.3rem;display:block}
.hero-h1{font-size:clamp(2.5rem,4.5vw,4.2rem);font-weight:900;color:var(--brown);line-height:1.06;margin-bottom:1rem}
.hero-h1 em{font-style:italic;color:var(--g1)}
.hero-h1 .hl3{color:var(--g2);display:block}
.hero-p{font-size:1rem;color:var(--text2);line-height:1.85;margin-bottom:2rem;max-width:510px}
.hero-btns{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2rem}
.hero-chips{display:flex;gap:.6rem;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:.3rem;font-size:.72rem;font-weight:700;color:var(--text3);padding:.26rem .72rem;background:rgba(255,255,255,.75);border:1.5px solid var(--border);border-radius:50px;backdrop-filter:blur(8px);transition:.2s}
.chip:hover{border-color:var(--g3);color:var(--g1);background:#fff}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem}
.hg{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.8);border-radius:var(--r2);padding:1.1rem .9rem;text-align:center;cursor:pointer;transition:all .28s;box-shadow:var(--sh)}
.hg:hover{transform:translateY(-6px);box-shadow:var(--sh2);border-color:var(--g3);background:#fff}
.hg em{font-size:2.8rem;display:block;margin-bottom:.4rem;font-style:normal;transition:.3s}
.hg:hover em{transform:scale(1.15)}
.hg-name{font-family:'Playfair Display',serif;font-size:.78rem;font-weight:700;color:var(--brown);line-height:1.2}
.hg-price{font-size:.7rem;color:var(--g2);font-weight:800;margin-top:.15rem}
.hg-off{display:inline-block;background:var(--red);color:#fff;font-size:.54rem;font-weight:800;padding:.1rem .38rem;border-radius:50px;margin-bottom:.3rem}

/* ══════ SECTIONS ══════ */
.sec{padding:5.5rem 4vw}.sec-sm{padding:3rem 4vw}
.sec-green{background:var(--g1)}.sec-white{background:#fff}.sec-cream{background:var(--cream2)}
.lbl{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.2em;color:var(--g2);margin-bottom:.45rem;display:block}
.sec-green .lbl{color:var(--gold2)}
.sh2{font-size:clamp(1.8rem,2.8vw,2.6rem);font-weight:700;color:var(--brown);margin-bottom:.5rem}
.sec-green .sh2{color:#fff}
.sh2 em{font-style:italic;color:var(--g1)}
.sec-green .sh2 em{color:var(--gold2)}
.sdesc{font-size:.95rem;color:var(--text2);line-height:1.85;max-width:580px;margin-top:.55rem}
.sec-green .sdesc{color:rgba(255,255,255,.72)}
.sdiv{width:48px;height:3px;background:linear-gradient(90deg,var(--g1),var(--g3));border-radius:2px;margin:.65rem 0}
.sec-green .sdiv{background:linear-gradient(90deg,var(--gold2),var(--gold))}
.tc{text-align:center}.tc .sdesc,.tc .sdiv{margin-left:auto;margin-right:auto}

/* Stats Band */
.stats-band{display:grid;grid-template-columns:repeat(4,1fr);gap:2rem;padding:3rem 4vw;background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:var(--r3);margin:0 4vw}
.stat-n{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;color:var(--gold2);display:block;line-height:1}
.stat-l{font-size:.72rem;color:rgba(255,255,255,.72);text-transform:uppercase;letter-spacing:.1em;margin-top:.3rem;display:block}

/* Enzyme Intro */
.enzyme-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.e-facts{display:flex;gap:2rem;margin-top:2rem;flex-wrap:wrap}
.e-fact .num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:var(--gold2);display:block}
.e-fact .lab{font-size:.68rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.08em}
.e-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.e-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:var(--r2);padding:1.3rem;transition:.25s}
.e-card:hover{background:rgba(255,255,255,.16);transform:translateY(-3px)}
.e-card.full{grid-column:1/-1}
.e-ico{font-size:2rem;margin-bottom:.55rem;display:block}
.e-card h4{font-family:'Playfair Display',serif;color:#fff;font-size:.92rem;margin-bottom:.25rem}
.e-card p{font-size:.76rem;color:rgba(255,255,255,.62);line-height:1.6}

/* Process */
.process{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-top:3rem;position:relative}
.process::before{content:'';position:absolute;top:27px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,var(--g4),var(--gold2),var(--g4));z-index:0}
.ps{text-align:center;position:relative;z-index:1}
.ps-circle{width:56px;height:56px;border-radius:50%;background:#fff;border:3px solid var(--gold);margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 0 0 6px var(--cream),0 4px 16px rgba(0,0,0,.1)}
.ps h5{font-family:'Playfair Display',serif;font-size:.82rem;color:var(--brown);font-weight:700;margin-bottom:.25rem}
.ps p{font-size:.7rem;color:var(--text3);line-height:1.55}

/* Products */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.4rem;margin-top:2.2rem}
.pc{background:#fff;border:1.5px solid var(--border);border-radius:var(--r3);overflow:hidden;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;position:relative}
.pc:hover{box-shadow:var(--sh3);transform:translateY(-6px);border-color:var(--g3)}
.pc-img{background:linear-gradient(160deg,var(--g5),#d8f5e3);padding:2.2rem 1rem 1.6rem;text-align:center;font-size:4.5rem;position:relative;transition:.3s;overflow:hidden}
.pc-img::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 30%,rgba(255,255,255,.4),transparent 60%)}
.pc:hover .pc-img{background:linear-gradient(160deg,var(--g4),#a8e8bc)}
.pc-off{position:absolute;top:.55rem;left:.55rem;background:linear-gradient(135deg,var(--red),#c62828);color:#fff;font-size:.56rem;font-weight:800;padding:.18rem .5rem;border-radius:50px;text-transform:uppercase;letter-spacing:.04em}
.pc-body{padding:1rem;flex:1;display:flex;flex-direction:column}
.pc-cat{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--g2);margin-bottom:.22rem}
.pc-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--brown);margin-bottom:.28rem;line-height:1.2}
.pc-tag{font-size:.74rem;color:var(--text3);line-height:1.55;margin-bottom:.75rem;flex:1}
.pc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.pc-price{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;color:var(--g1)}
.pc-mrp{font-size:.68rem;color:var(--text4);text-decoration:line-through;margin-left:.2rem}
.pc-add{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;border-radius:50px;padding:.35rem .85rem;font-size:.72rem;font-weight:800;cursor:pointer;transition:.2s;border:none;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(26,92,42,.25)}
.pc-add:hover{background:var(--brown);transform:scale(1.04)}
.cat-pills{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.8rem;justify-content:center}
.cat-pill{padding:.38rem 1rem;border:1.5px solid var(--border);border-radius:50px;font-size:.75rem;font-weight:700;cursor:pointer;transition:.2s;background:#fff;color:var(--text2)}
.cat-pill.on{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(26,92,42,.25)}
.cat-pill:hover:not(.on){border-color:var(--g3);color:var(--g1)}

/* Eco */
.eco-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1.2rem;margin-top:2.5rem}
.eco-card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:var(--r2);padding:1.6rem 1.1rem;text-align:center;transition:.28s;position:relative;overflow:hidden}
.eco-card:hover{background:rgba(255,255,255,.18);transform:translateY(-5px)}
.eco-ico{font-size:2.4rem;margin-bottom:.6rem;display:block}
.eco-card h4{font-family:'Playfair Display',serif;color:#fff;font-size:.9rem;margin-bottom:.3rem}
.eco-card p{font-size:.73rem;color:rgba(255,255,255,.62);line-height:1.6}

/* Testimonials */
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem}
.tc-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r2);padding:1.6rem;transition:.28s;position:relative;overflow:hidden}
.tc-card::after{content:'"';position:absolute;top:-.5rem;right:1rem;font-size:7rem;color:var(--g4);font-family:'Playfair Display',serif;line-height:1;pointer-events:none}
.tc-card:hover{box-shadow:var(--sh3);transform:translateY(-4px);border-color:var(--g3)}
.tc-stars{color:var(--gold);font-size:.95rem;letter-spacing:.06em;margin-bottom:.75rem}
.tc-q{font-family:'Playfair Display',serif;font-style:italic;font-size:.92rem;color:var(--text2);line-height:1.75;margin-bottom:1.2rem;position:relative;z-index:1}
.tc-user{display:flex;align-items:center;gap:.65rem}
.tc-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--g4),var(--g3));display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:2px solid var(--g3);flex-shrink:0}
.tc-name{font-weight:800;font-size:.82rem;color:var(--brown)}
.tc-loc{font-size:.7rem;color:var(--text3)}

/* CTA Band */
.cta-band{background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:var(--r3);padding:3rem 3.5rem;display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center;margin:0 2vw;position:relative;overflow:hidden}
.cta-band::before{content:'🍃';position:absolute;right:260px;top:-20px;font-size:10rem;opacity:.06;pointer-events:none}
.cta-btns{display:flex;gap:.7rem;white-space:nowrap}

/* Product Detail */
.pd-page{padding-top:72px}
.pd-hero{background:linear-gradient(150deg,var(--g5),var(--cream2));padding:2.5rem 4vw;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
.pd-vis{background:linear-gradient(160deg,var(--g5),#d8f5e3);border:2px solid var(--border);border-radius:var(--r3);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;text-align:center;position:sticky;top:82px;box-shadow:var(--sh)}
.pd-emoji{font-size:8rem;animation:fl 3.5s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.pd-vis-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--brown);margin-top:1rem}
.pd-vis-cat{font-size:.7rem;color:var(--text3);margin-top:.2rem}
.pd-chips{display:flex;gap:.35rem;justify-content:center;margin-top:.75rem;flex-wrap:wrap}
.pd-chip{background:var(--g4);color:var(--g1);border-radius:50px;padding:.18rem .6rem;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.pd-bc{font-size:.74rem;color:var(--text3);margin-bottom:.7rem}
.pd-bc span{cursor:pointer;transition:.2s}.pd-bc span:hover{color:var(--g1)}
.pd-badges{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.9rem}
.pd-badge{background:var(--g5);color:var(--g1);border:1px solid var(--g4);border-radius:50px;padding:.18rem .6rem;font-size:.62rem;font-weight:800}
.pd-h1{font-size:clamp(1.8rem,2.8vw,2.5rem);font-weight:900;color:var(--brown);margin-bottom:.4rem}
.pd-tag{font-size:.95rem;color:var(--text2);line-height:1.75;margin-bottom:1.1rem}
.price-box{background:linear-gradient(160deg,var(--cream2),#ede0c4);border-radius:var(--r2);padding:1.5rem;margin-bottom:1.4rem;border:1px solid var(--border);box-shadow:var(--sh)}
.price-row{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.2rem}
.price-now{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:900;color:var(--g1)}
.price-mrp{font-size:.9rem;color:var(--text4);text-decoration:line-through}
.price-save{background:linear-gradient(135deg,var(--red),#c62828);color:#fff;font-size:.62rem;font-weight:800;padding:.15rem .55rem;border-radius:50px}
.vol-lbl{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:.5rem}
.vol-pills{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.9rem}

.tl-item{display:flex;align-items:center;gap:.8rem;font-size:.82rem}
.tl-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800}
.tl-dot.done{background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff}
.tl-dot.soon{background:var(--cream2);border:2px solid var(--g3);color:var(--g2)}
.tl-txt{font-weight:700;color:var(--brown)}.tl-sub{font-size:.72rem;color:var(--text3)}

/* Footer */
.footer{background:linear-gradient(160deg,var(--brown),#3a2210);color:rgba(255,255,255,.58);padding:4rem 4vw 2rem}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;padding-bottom:2.5rem;border-bottom:1px solid rgba(255,255,255,.08)}
.footer-brand p{font-size:.8rem;line-height:1.8;margin-top:.55rem;max-width:260px}
.footer-col h5{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--gold2);margin-bottom:.9rem}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:.45rem}
.footer-col li{font-size:.78rem;cursor:pointer;transition:.2s}
.footer-col li:hover{color:#fff}
.footer-bot{display:flex;justify-content:space-between;align-items:center;padding-top:1.5rem;font-size:.73rem;flex-wrap:wrap;gap:.5rem}
.fnav{display:flex;gap:1.1rem}
.fnav span{cursor:pointer;transition:.2s}.fnav span:hover{color:#fff}
.empty{text-align:center;padding:4rem 2rem}

/* Responsive */
@media(max-width:960px){
  .hero,.enzyme-grid,.pd-hero,.cart-layout,.footer-grid{grid-template-columns:1fr}
  .hero{padding-bottom:3rem}.hero-right,.pd-vis{position:static}
  .testi-grid,.eco-row{grid-template-columns:1fr 1fr}
  .process{grid-template-columns:1fr 1fr}.process::before{display:none}
  .e-cards{grid-column:1fr}
  .cta-band{grid-template-columns:1fr}
  .stats-band{grid-template-columns:1fr 1fr}
  .nav-links{display:none}
  .pm-row2,.bank-grid{grid-template-columns:1fr}
  .upi-apps{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .prod-grid{grid-template-columns:1fr 1fr}
  .eco-row,.testi-grid{grid-template-columns:1fr}
  .form-row2,.map-opts{grid-template-columns:1fr}
  .hero-grid{grid-template-columns:1fr 1fr 1fr}
}

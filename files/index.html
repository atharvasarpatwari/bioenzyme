<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidhatri — Bio Enzyme Natural Products</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Nunito:wght@300;400;600;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#1a5c2a;--g2:#2d7a42;--g3:#3da056;--g4:#c8f0d0;--g5:#eaf7ed;
  --gold:#d4a017;--gold2:#f0c040;--gold3:#fff8e1;
  --cream:#fdfaf3;--cream2:#f4edda;--cream3:#e8d9b0;
  --brown:#4a2c0a;--brown2:#6b3f10;
  --text:#1a1a1a;--text2:#444;--text3:#777;--text4:#aaa;
  --white:#fff;--border:#e0d4b8;--border2:#c8b990;
  --red:#e53935;--orange:#f57c00;
  --shadow:0 2px 16px rgba(26,92,42,.10);
  --shadow2:0 8px 40px rgba(26,92,42,.18);
  --r:8px;--r2:14px;--r3:22px;--r4:32px;
}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;min-height:100vh}
h1,h2,h3,h4,h5{font-family:'Playfair Display',serif;line-height:1.2}
a{text-decoration:none;color:inherit}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:'Nunito',sans-serif;outline:none}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--cream2)}
::-webkit-scrollbar-thumb{background:var(--g3);border-radius:3px}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--g1);color:#fff;padding:.65rem 1.6rem;border-radius:50px;
  font-size:.85rem;font-weight:700;z-index:9999;transition:transform .3s;white-space:nowrap;
  box-shadow:var(--shadow2);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* TOP BAR */
.topbar{background:var(--g1);color:#fff;text-align:center;padding:.32rem 1rem;
  font-size:.75rem;font-weight:600;letter-spacing:.03em}
.topbar a{color:var(--gold2);text-decoration:underline;margin-left:.4rem}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(253,250,243,.97);
  backdrop-filter:blur(18px);border-bottom:1.5px solid var(--border);transition:.3s}
.nav.scrolled{box-shadow:var(--shadow2)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:.65rem 3vw;gap:1rem}
.logo{display:flex;align-items:center;gap:.55rem;cursor:pointer}
.logo-leaf{width:38px;height:38px;background:var(--g1);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.logo-name{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:900;
  color:var(--g1);line-height:1}
.logo-sub{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text3);display:block;font-family:'Nunito',sans-serif;font-weight:600}
.nav-links{display:flex;gap:.2rem;overflow-x:auto}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{padding:.38rem .85rem;font-size:.78rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--text2);cursor:pointer;border-radius:50px;
  white-space:nowrap;transition:.2s;border:1.5px solid transparent}
.nav-link:hover,.nav-link.on{background:var(--g1);color:#fff}
.nav-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.nav-icon{position:relative;background:none;border:none;cursor:pointer;font-size:1.25rem;
  padding:.3rem;border-radius:50%;transition:.2s;color:var(--g1)}
.nav-icon:hover{background:var(--g4)}
.cart-badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;
  width:17px;height:17px;border-radius:50%;font-size:.6rem;font-weight:900;
  display:flex;align-items:center;justify-content:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
  font-weight:800;font-size:.85rem;border-radius:50px;transition:all .22s;
  cursor:pointer;padding:.65rem 1.5rem;border:2px solid transparent;font-family:'Nunito',sans-serif;letter-spacing:.02em}
.btn-green{background:var(--g1);color:#fff;border-color:var(--g1)}
.btn-green:hover{background:var(--brown);border-color:var(--brown)}
.btn-outline{background:transparent;color:var(--g1);border-color:var(--g1)}
.btn-outline:hover{background:var(--g1);color:#fff}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn-gold:hover{background:var(--brown);border-color:var(--brown)}
.btn-white{background:#fff;color:var(--g1);border-color:#fff}
.btn-white:hover{background:var(--g4)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:.4rem .95rem;font-size:.75rem}
.btn-lg{padding:.85rem 2rem;font-size:.95rem}
.btn-xl{padding:1rem 2.4rem;font-size:1rem}
.btn-full{width:100%}

/* HERO */
.hero{padding:96px 4vw 0;min-height:90vh;display:grid;
  grid-template-columns:1fr 1fr;align-items:center;gap:3rem;
  background:linear-gradient(150deg,var(--g5) 0%,var(--cream2) 55%,var(--cream3) 100%);
  position:relative;overflow:hidden}
.hero::after{content:'🍃';font-size:22rem;position:absolute;right:-3vw;
  bottom:-3rem;opacity:.06;pointer-events:none;line-height:1}
.hero-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--g1);
  color:#fff;padding:.28rem .85rem;border-radius:50px;font-size:.7rem;
  font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem}
.hero-script{font-family:'Caveat',cursive;font-size:1.5rem;color:var(--gold);margin-bottom:.3rem}
.hero-h1{font-size:clamp(2.4rem,4.5vw,4rem);font-weight:900;color:var(--brown);
  line-height:1.08;margin-bottom:1rem}
.hero-h1 em{font-style:italic;color:var(--g1)}
.hero-p{font-size:1rem;color:var(--text2);line-height:1.85;margin-bottom:1.8rem;max-width:500px}
.hero-btns{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2rem}
.hero-chips{display:flex;gap:.7rem;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:.3rem;font-size:.74rem;font-weight:700;
  color:var(--text3);padding:.28rem .75rem;background:rgba(255,255,255,.7);
  border:1.5px solid var(--border);border-radius:50px;backdrop-filter:blur(8px)}
.hero-visual{position:relative;z-index:1}
.hero-prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.h-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r3);
  padding:1.3rem 1rem;text-align:center;cursor:pointer;transition:.25s;box-shadow:var(--shadow)}
.h-card:hover{transform:translateY(-5px);box-shadow:var(--shadow2);border-color:var(--g3)}
.h-card-em{font-size:3rem;display:block;margin-bottom:.5rem}
.h-card-name{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700;color:var(--brown)}
.h-card-price{font-size:.75rem;color:var(--g2);font-weight:700;margin-top:.18rem}
.h-card-badge{background:var(--red);color:#fff;font-size:.58rem;font-weight:800;
  padding:.15rem .45rem;border-radius:50px;text-transform:uppercase;margin-bottom:.4rem;display:inline-block}

/* SECTION BASE */
.sec{padding:5.5rem 4vw}
.sec-sm{padding:3rem 4vw}
.sec-green{background:var(--g1)}
.sec-white{background:#fff}
.sec-cream{background:var(--cream2)}
.sec-dark{background:var(--brown)}
.lbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.2em;
  color:var(--g2);margin-bottom:.45rem;display:block}
.sec-green .lbl,.sec-dark .lbl{color:var(--gold2)}
.sh2{font-size:clamp(1.75rem,2.8vw,2.5rem);font-weight:700;color:var(--brown);margin-bottom:.5rem}
.sec-green .sh2,.sec-dark .sh2{color:#fff}
.sh2 em{font-style:italic;color:var(--g1)}
.sec-green .sh2 em,.sec-dark .sh2 em{color:var(--gold2)}
.sdesc{font-size:.95rem;color:var(--text2);line-height:1.82;max-width:580px;margin-top:.5rem}
.sec-green .sdesc,.sec-dark .sdesc{color:rgba(255,255,255,.72)}
.sdiv{width:44px;height:3px;background:var(--g2);border-radius:2px;margin:.6rem 0}
.sec-green .sdiv,.sec-dark .sdiv{background:var(--gold2)}
.tc{text-align:center}.tc .sdesc,.tc .sdiv{margin-left:auto;margin-right:auto}

/* ENZYME INTRO */
.enzyme-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.e-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.e-card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);
  border-radius:var(--r2);padding:1.3rem;transition:.25s}
.e-card:hover{background:rgba(255,255,255,.17)}
.e-card.full{grid-column:1/-1}
.e-ico{font-size:2rem;margin-bottom:.55rem;display:block}
.e-card h4{font-family:'Playfair Display',serif;color:#fff;font-size:.92rem;margin-bottom:.25rem}
.e-card p{font-size:.77rem;color:rgba(255,255,255,.65);line-height:1.6}
.enzyme-facts{display:flex;gap:1.5rem;margin-top:1.8rem;flex-wrap:wrap}
.e-fact{text-align:center}
.e-fact .num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold2)}
.e-fact .lab{font-size:.7rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.08em}

/* PROCESS STEPS */
.process{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;
  margin-top:3rem;position:relative}
.process::before{content:'';position:absolute;top:27px;left:10%;right:10%;
  height:2px;background:linear-gradient(90deg,var(--g4),var(--gold),var(--g4))}
.p-step{text-align:center;position:relative;z-index:1}
.p-circle{width:54px;height:54px;border-radius:50%;background:var(--white);
  border:3px solid var(--gold);margin:0 auto 1rem;display:flex;align-items:center;
  justify-content:center;font-size:1.4rem;box-shadow:0 0 0 5px var(--cream)}
.p-step h5{font-family:'Playfair Display',serif;font-size:.82rem;color:var(--brown);
  font-weight:700;margin-bottom:.25rem}
.p-step p{font-size:.72rem;color:var(--text3);line-height:1.5}

/* PRODUCT GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));
  gap:1.4rem;margin-top:2.2rem}
.prod-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r3);
  overflow:hidden;cursor:pointer;transition:all .28s;display:flex;flex-direction:column}
.prod-card:hover{box-shadow:var(--shadow2);transform:translateY(-5px);border-color:var(--g3)}
.prod-img{background:var(--g5);padding:2.2rem 1rem;text-align:center;
  font-size:4.5rem;position:relative;transition:.3s}
.prod-card:hover .prod-img{background:var(--g4)}
.prod-off{position:absolute;top:.55rem;left:.55rem;background:var(--red);color:#fff;
  font-size:.58rem;font-weight:800;padding:.18rem .5rem;border-radius:50px;
  text-transform:uppercase;letter-spacing:.04em}
.prod-body{padding:1rem;flex:1;display:flex;flex-direction:column}
.prod-cat{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;
  color:var(--g2);margin-bottom:.22rem}
.prod-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
  color:var(--brown);margin-bottom:.28rem;line-height:1.25}
.prod-tag{font-size:.75rem;color:var(--text3);line-height:1.55;margin-bottom:.75rem;flex:1}
.prod-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.prod-price{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;color:var(--g1)}
.prod-mrp{font-size:.7rem;color:var(--text4);text-decoration:line-through;margin-left:.22rem}
.add-btn{background:var(--g1);color:#fff;border-radius:50px;padding:.34rem .8rem;
  font-size:.73rem;font-weight:800;cursor:pointer;transition:.2s;border:none;font-family:'Nunito',sans-serif}
.add-btn:hover{background:var(--brown)}

/* CAT FILTER */
.cat-pills{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.8rem;justify-content:center}
.cat-pill{padding:.38rem 1rem;border:1.5px solid var(--border);border-radius:50px;
  font-size:.76rem;font-weight:700;cursor:pointer;transition:.2s;background:#fff;color:var(--text2)}
.cat-pill.on,.cat-pill:hover{background:var(--g1);color:#fff;border-color:var(--g1)}

/* ECO FEATS */
.eco-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1.2rem;margin-top:2.5rem}
.eco-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:var(--r2);padding:1.5rem 1rem;text-align:center;transition:.25s}
.eco-card:hover{background:rgba(255,255,255,.2);transform:translateY(-3px)}
.eco-icon{font-size:2.2rem;margin-bottom:.55rem;display:block}
.eco-card h4{font-family:'Playfair Display',serif;color:#fff;font-size:.9rem;margin-bottom:.3rem}
.eco-card p{font-size:.74rem;color:rgba(255,255,255,.65);line-height:1.58}

/* TESTIMONIALS */
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem}
.t-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r2);
  padding:1.5rem;transition:.25s}
.t-card:hover{box-shadow:var(--shadow2);transform:translateY(-3px)}
.t-stars{color:var(--gold);font-size:.95rem;letter-spacing:.05em;margin-bottom:.7rem}
.t-q{font-family:'Playfair Display',serif;font-style:italic;font-size:.92rem;
  color:var(--text2);line-height:1.72;margin-bottom:1.1rem}
.t-user{display:flex;align-items:center;gap:.6rem}
.t-av{width:38px;height:38px;border-radius:50%;background:var(--g4);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  border:2px solid var(--g3);flex-shrink:0}
.t-name{font-weight:800;font-size:.82rem;color:var(--brown)}
.t-loc{font-size:.7rem;color:var(--text3)}

/* CTA BAND */
.cta-band{background:var(--g1);border-radius:var(--r3);padding:3rem 3.5rem;
  display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center;margin:0 2vw}
.cta-btns{display:flex;gap:.7rem;white-space:nowrap}

/* PRODUCT DETAIL */
.pd-page{padding-top:70px}
.pd-hero{background:linear-gradient(150deg,var(--g5),var(--cream2));
  padding:2.5rem 4vw;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
.pd-visual{background:#fff;border:2px solid var(--border);border-radius:var(--r3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 2rem;text-align:center;position:sticky;top:85px}
.pd-emoji{font-size:8rem;animation:fl 3.5s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.pd-vis-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;
  color:var(--brown);margin-top:1rem}
.pd-vis-cat{font-size:.7rem;color:var(--text3);margin-top:.2rem}
.pd-vis-chips{display:flex;gap:.35rem;justify-content:center;margin-top:.75rem;flex-wrap:wrap}
.vis-chip{background:var(--g4);color:var(--g1);border-radius:50px;padding:.18rem .6rem;
  font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.pd-bc{font-size:.74rem;color:var(--text3);margin-bottom:.7rem}
.pd-bc span{cursor:pointer;transition:.2s}
.pd-bc span:hover{color:var(--g1)}
.pd-badges{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.9rem}
.pd-badge{background:var(--g5);color:var(--g1);border:1px solid var(--g4);
  border-radius:50px;padding:.18rem .6rem;font-size:.62rem;font-weight:800;
  text-transform:uppercase;letter-spacing:.07em}
.pd-h1{font-size:clamp(1.7rem,2.8vw,2.4rem);font-weight:900;color:var(--brown);margin-bottom:.4rem}
.pd-tag{font-size:.95rem;color:var(--text2);line-height:1.75;margin-bottom:1.1rem}
.price-box{background:var(--cream2);border-radius:var(--r2);padding:1.4rem;
  margin-bottom:1.4rem;border:1px solid var(--border)}
.price-row{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.2rem}
.price-now{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:900;color:var(--g1)}
.price-mrp{font-size:.88rem;color:var(--text4);text-decoration:line-through}
.price-save{background:var(--red);color:#fff;font-size:.62rem;font-weight:800;
  padding:.15rem .5rem;border-radius:50px;text-transform:uppercase}
.vol-lbl{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text3);margin-bottom:.5rem}
.vol-pills{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.9rem}
.v-pill{padding:.38rem .95rem;border:1.5px solid var(--border);border-radius:50px;
  font-size:.78rem;font-weight:700;cursor:pointer;transition:.2s;
  background:#fff;color:var(--text2)}
.v-pill.on{border-color:var(--g1);background:var(--g1);color:#fff}
.v-pill:hover:not(.on){border-color:var(--g3);color:var(--g1)}
.qty-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem}
.qty-lbl{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}
.qty-wrap{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:50px;overflow:hidden}
.q-btn{width:34px;height:34px;background:var(--cream2);border:none;font-size:1.1rem;
  font-weight:800;cursor:pointer;transition:.2s;color:var(--text2)}
.q-btn:hover{background:var(--g1);color:#fff}
.q-val{width:42px;text-align:center;font-weight:800;font-size:.92rem;border:none;
  background:#fff;color:var(--brown)}
.pd-actions{display:flex;gap:.6rem;margin-bottom:.9rem}
.pd-actions .btn{flex:1;text-align:center}
.pd-meta{display:flex;gap:1.2rem;font-size:.76rem;color:var(--text3);flex-wrap:wrap}
.pd-meta strong{color:var(--text2)}

/* TABS */
.tabs{margin-top:2rem}
.tab-nav{display:flex;border-bottom:2px solid var(--border);overflow-x:auto}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{padding:.6rem 1.1rem;font-size:.73rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.07em;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-2px;white-space:nowrap;transition:.2s;background:none;
  border-top:none;border-left:none;border-right:none;font-family:'Nunito',sans-serif}
.tab-btn.on{color:var(--g1);border-bottom-color:var(--g1)}
.tab-btn:hover{color:var(--g1)}
.tab-body{display:none;padding-top:1.4rem}
.tab-body.on{display:block}
.ing-cloud{display:flex;flex-wrap:wrap;gap:.45rem}
.ing-tag{background:var(--g5);color:var(--g1);border:1px solid var(--g4);
  border-radius:50px;padding:.28rem .8rem;font-size:.76rem;font-weight:700}
.hiw-list{display:flex;flex-direction:column;gap:.75rem}
.hiw-item{display:flex;gap:.85rem;align-items:flex-start;padding:.9rem;
  background:var(--cream2);border-radius:var(--r);border:1px solid var(--border)}
.hiw-n{width:28px;height:28px;border-radius:50%;background:var(--gold);color:#fff;
  font-weight:800;font-size:.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hiw-item h5{font-weight:800;font-size:.85rem;color:var(--brown);margin-bottom:.12rem}
.hiw-item p{font-size:.78rem;color:var(--text2);line-height:1.58}
.shelf-bar{background:var(--border);border-radius:50px;height:8px;overflow:hidden;margin:.5rem 0}
.shelf-fill{height:100%;background:linear-gradient(90deg,var(--g1),var(--gold));border-radius:50px}
.vol-tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.vol-tbl th{background:var(--g1);color:#fff;padding:.5rem .9rem;text-align:left;
  font-size:.67rem;text-transform:uppercase;letter-spacing:.1em}
.vol-tbl td{padding:.58rem .9rem;border-bottom:1px solid var(--border);color:var(--text2)}
.vol-tbl tr:last-child td{border-bottom:none}
.vol-tbl tr.best td{background:#fff8e1;font-weight:700;color:var(--brown)}
.vol-tbl tr.best td:last-child::after{content:' 🔥'}
.vol-tbl tbody tr{cursor:pointer;transition:.15s}
.vol-tbl tbody tr:hover td{background:var(--g5)}
.pay-opts{display:flex;flex-direction:column;gap:.5rem}
.pay-opt{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.1rem;
  border:1.5px solid var(--border);border-radius:var(--r2);background:#fff;
  font-size:.84rem;color:var(--text2)}
.pay-opt span:first-child{font-size:1.35rem;flex-shrink:0}

function addCart(p,vol,price,qty=1){
  const ex=S.cart.find(i=>i.id===p.id&&i.vol===vol);

}
function remCart(id,vol){S.cart=S.cart.filter(i=>!(i.id===id&&i.vol===vol));saveCart();render()}

function getPrice(p){
  const sv=S.selVol[p.id]||p.defVol;
  const vr=p.vols.find(v=>v[0]===sv);

    🛒 Your Cart ${items.length?`<span style="font-size:1rem;color:var(--text3);font-family:'Nunito',sans-serif">(${cartCount()} items)</span>`:''}
  </h1>
  ${!items.length?`<div class="empty-state">
    <div class="es-em">🛒</div>
    <h3>Your cart is empty</h3>
    <p>Browse our bio enzyme products and add something natural!</p>
    <button class="btn btn-green" style="margin-top:1.2rem" onclick="go('home')">🌿 Shop Products</button>
  </div>`:`
  <div class="cart-layout">
    <div>
      <div class="cart-items-list">
        ${items.map(it=>`<div class="c-item">
          <div class="c-em">${it.emoji}</div>
          <div class="c-info">
            <div class="c-name">${it.name}</div>
            <div class="c-vol">Size: ${it.vol}</div>
            <div class="c-price">₹${it.price} <span style="font-size:.72rem;color:var(--text3);font-weight:400">each</span></div>
            <div class="c-row">
              <div class="qty-wrap">
                <button class="q-btn" onclick="updQty('${it.id}','${it.vol}',${it.qty-1})">−</button>
                <span class="q-val">${it.qty}</span>
                <button class="q-btn" onclick="updQty('${it.id}','${it.vol}',${it.qty+1})">+</button>
              </div>
              <div style="display:flex;align-items:center;gap:1rem">
                <strong style="font-family:'Playfair Display',serif;color:var(--g1)">₹${it.price*it.qty}</strong>
                <button class="c-remove" onclick="remCart('${it.id}','${it.vol}')">✕ Remove</button>
              </div>
            </div>
          </div>
        </div>`).join('')}
      </div>
      <button class="btn btn-outline btn-sm" onclick="go('home')" style="margin-top:1rem">← Continue Shopping</button>
    </div>

    <!-- SUMMARY + ADDRESS -->
    <div class="cart-sum">
      <h3>Order Summary</h3>
      <div class="sum-row"><span>Subtotal (${cartCount()} items)</span><span>₹${sub}</span></div>
      <div class="sum-row${del===0?' sum-free':''}"><span>Delivery</span><span>${del===0?'FREE':'₹'+del}</span></div>
      ${del>0?`<div style="font-size:.7rem;color:var(--g2);margin-bottom:.4rem">Add ₹${499-sub} more for FREE delivery!</div>`:''}
      <div class="sum-row sum-total"><span>Total</span><span>₹${tot}</span></div>

      <!-- ADDRESS FORM -->
      <div class="addr-sec">
        <h4>📍 Delivery Address</h4>
        <div class="form-row2">
          <div class="fg"><label class="fl">First Name *</label><input class="fi" id="fn" placeholder="Ravi" value="${addr.fn||''}"></div>
          <div class="fg"><label class="fl">Last Name *</label><input class="fi" id="ln" placeholder="Kumar" value="${addr.ln||''}"></div>
        </div>
        <div class="fg"><label class="fl">Mobile Number *</label><input class="fi" id="mob" placeholder="+91 98765 43210" value="${addr.mob||''}"></div>
        <div class="fg"><label class="fl">House / Flat / Building *</label><input class="fi" id="l1" placeholder="Flat 301, Green Towers" value="${addr.l1||''}"></div>
        <div class="fg"><label class="fl">Street / Area / Landmark *</label><input class="fi" id="l2" placeholder="MG Road, Banjara Hills" value="${addr.l2||''}"></div>
        <div class="form-row2">
          <div class="fg"><label class="fl">City *</label><input class="fi" id="city" placeholder="Hyderabad" value="${addr.city||''}"></div>
          <div class="fg"><label class="fl">PIN Code *</label><input class="fi" id="pin" placeholder="500034" value="${addr.pin||''}"></div>
        </div>
        <div class="fg">
          <label class="fl">State *</label>
          <select class="fs" id="state">
            <option value="">Select State</option>
            ${STATES.map(s=>`<option value="${s}"${addr.state===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="fg"><label class="fl">Delivery Instructions (optional)</label><textarea class="fta" id="note" placeholder="Leave at security, call before delivery...">${addr.note||''}</textarea></div>
        <span class="map-link" onclick="locateMe()">📍 Auto-locate my address on map</span>
      </div>

      <button class="btn btn-green btn-full btn-lg" style="margin-top:1.2rem" onclick="toPayment()">Proceed to Payment →</button>
      <div style="text-align:center;font-size:.7rem;color:var(--text3);margin-top:.6rem">🔒 Secure checkout · Your data is safely stored locally</div>
    </div>
  </div>`}
</div>
${footerHTML()}`
}

function locateMe(){
  if(!navigator.geolocation){toast('Location not supported in this browser');return}
  toast('📍 Getting your location...');
  navigator.geolocation.getCurrentPosition(pos=>{
    toast('📍 Location found! Opening map...');
    window.open(`https://maps.google.com?q=${pos.coords.latitude},${pos.coords.longitude}`,'_blank');
  },()=>toast('❌ Location access denied. Please fill address manually.'));
}

function toPayment(){
  const fn=document.getElementById('fn')?.value.trim();
  const ln=document.getElementById('ln')?.value.trim();
  const mob=document.getElementById('mob')?.value.trim();
  const l1=document.getElementById('l1')?.value.trim();
  const l2=document.getElementById('l2')?.value.trim();
  const city=document.getElementById('city')?.value.trim();
  const pin=document.getElementById('pin')?.value.trim();
  const state=document.getElementById('state')?.value;
  const note=document.getElementById('note')?.value.trim();
  if(!fn||!ln||!mob||!l1||!city||!pin||!state){toast('❌ Please fill all required (*) fields');return}
  if(!/^\d{10}$/.test(mob.replace(/\D/g,''))){toast('❌ Please enter a valid 10-digit mobile number');return}
  if(!/^\d{6}$/.test(pin)){toast('❌ Please enter a valid 6-digit PIN code');return}
  saveAddr({fn,ln,mob,l1,l2,city,pin,state,note});
  go('payment');
}

/* ═══════════════════════════
   PAYMENT PAGE
═══════════════════════════ */
function paymentHTML(){
  if(!S.cart.length){go('home');return''}
  const sub=cartSub();
  const del=sub>=499?0:50;
  const codFee=S.payM==='cod'?30:0;
  const tot=sub+del+codFee;
  const addr=S.addr||{};
  const methods=[
    {id:'upi',icon:'📱',name:'UPI Payment',desc:'GPay, PhonePe, Paytm — instant transfer'},
    {id:'card',icon:'💳',name:'Credit / Debit Card',desc:'Visa, Mastercard, RuPay — all accepted'},
    {id:'netbank',icon:'🏦',name:'Net Banking',desc:'All major Indian banks'},
    {id:'cod',icon:'💵',name:'Cash on Delivery',desc:'Pay on arrival · ₹30 handling fee extra'},
    {id:'wa',icon:'💬',name:'WhatsApp Pay',desc:'Pay link sent to your WhatsApp'},

  return`${navHTML()}

    <span class="pb-step done">✓ Cart</span><span class="pb-sep">──</span>

    <span class="pb-step now">💳 Payment</span><span class="pb-sep">──</span>
    <span class="pb-step">Confirmation</span>
  </div>

    <button class="btn btn-outline btn-sm" onclick="go('cart')">← Back to Cart</button>
    <h1 style="font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--brown)">Secure Payment</h1>
  </div>

  <div class="pay-layout">
    <div>
      <h3 style="font-family:'Playfair Display',serif;color:var(--brown);margin-bottom:1rem">Choose Payment Method</h3>
      <div class="pm-list">
        ${methods.map(m=>`<div class="pm-opt${S.payM===m.id?' on':''}" onclick="setPayM('${m.id}')">
          <input type="radio" name="pm"${S.payM===m.id?' checked':''}>
          <span class="pm-icon">${m.icon}</span>
          <div class="pm-info"><h5>${m.name}</h5><p>${m.desc}</p></div>
        </div>`).join('')}
      </div>

      ${S.payM==='upi'?`<div class="info-box green" style="margin-bottom:1.2rem">
        <strong>Enter UPI ID</strong><br>
        <input class="fi" style="margin:.6rem 0" id="upi-id" placeholder="yourname@gpay or 9876543210@paytm">
        <div style="font-size:.7rem;color:var(--g1)">Or scan QR code shown on next screen after placing order.</div>
      </div>`:S.payM==='card'?`<div class="info-box cream" style="margin-bottom:1.2rem">
        <div class="fg"><label class="fl">Card Number</label><input class="fi" placeholder="1234 5678 9012 3456" maxlength="19"></div>
        <div class="form-row2">
          <div class="fg"><label class="fl">Expiry (MM/YY)</label><input class="fi" placeholder="12/27" maxlength="5"></div>
          <div class="fg"><label class="fl">CVV</label><input class="fi" placeholder="•••" maxlength="3" type="password"></div>
        </div>
        <div class="fg"><label class="fl">Name on Card</label><input class="fi" placeholder="RAVI KUMAR"></div>
      </div>`:S.payM==='cod'?`<div class="info-box gold" style="margin-bottom:1.2rem">💵 Cash on Delivery is available. A <strong>₹30 handling fee</strong> has been added to your total. Please keep exact change ready for the delivery partner.</div>`:`<div class="info-box green" style="margin-bottom:1.2rem">✓ You will receive a secure payment link on your registered WhatsApp / SMS after order placement.</div>`}

      <div class="info-box cream" style="margin-bottom:1.5rem">
        <strong>📍 Delivering to:</strong><br>
        <span style="font-size:.8rem;color:var(--text2)">${addr.fn||'—'} ${addr.ln||''}, ${addr.l1||'—'}, ${addr.l2?addr.l2+', ':''} ${addr.city||'—'} – ${addr.pin||'—'}, ${addr.state||'—'}<br>📱 ${addr.mob||'—'}</span><br>
        <button onclick="go('cart')" style="font-size:.72rem;color:var(--g1);font-weight:700;background:none;border:none;cursor:pointer;margin-top:.4rem">✎ Change Address</button>
      </div>

      <button class="btn btn-green btn-full btn-xl" onclick="placeOrder()">
        🎉 Place Order — ₹${tot}
      </button>
      <div style="text-align:center;font-size:.7rem;color:var(--text3);margin-top:.6rem">🔒 128-bit SSL encrypted · 100% secure payment</div>
    </div>

    <!-- ORDER SUMMARY PANEL -->
    <div class="pay-sum">
      <h3 style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--brown);margin-bottom:1rem;padding-bottom:.7rem;border-bottom:1px solid var(--border)">Order Summary</h3>
      ${S.cart.map(it=>`<div class="pay-item">
        <span class="pay-em2">${it.emoji}</span>
        <div style="flex:1"><div style="font-size:.82rem;font-weight:700;color:var(--brown)">${it.name}</div><div style="font-size:.7rem;color:var(--text3)">${it.vol} × ${it.qty}</div></div>
        <strong style="font-family:'Playfair Display',serif;color:var(--g1)">₹${it.price*it.qty}</strong>
      </div>`).join('')}
      <div style="margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--border)">
        <div class="sum-row"><span>Subtotal</span><span>₹${sub}</span></div>
        <div class="sum-row${del===0?' sum-free':''}"><span>Delivery</span><span>${del===0?'FREE':'₹'+del}</span></div>
        ${codFee?`<div class="sum-row"><span>COD Fee</span><span>₹${codFee}</span></div>`:''}
        <div class="sum-row sum-total"><span>Grand Total</span><span>₹${tot}</span></div>
      </div>
      <div class="info-box green" style="margin-top:1.2rem;font-size:.75rem">🌿 Every purchase supports zero-waste bio enzyme production and sustainable farming in India.</div>
    </div>
  </div>
</div>
${footerHTML()}`
}

function setPayM(m){S.payM=m;render()}

function placeOrder(){
  if(!S.addr){toast('❌ Please go back and enter your delivery address');return}
  const orderId='VID'+Date.now().toString().slice(-8);
  const sub=cartSub();
  const del=sub>=499?0:50;
  const codFee=S.payM==='cod'?30:0;
  const d=new Date();d.setDate(d.getDate()+3);
  const order={
    id:orderId,items:[...S.cart],address:{...S.addr},payM:S.payM,
    sub,del,codFee,tot:sub+del+codFee,status:'Confirmed',
    placed:new Date().toISOString(),
    estDelivery:d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})
  };
  S.orders.push(order);saveOrders();
  S.cart=[];saveCart();
  S.confId=orderId;
  go('confirm');
}

/* ═══════════════════════════
   ORDER CONFIRMATION
═══════════════════════════ */

  const payLabels={upi:'UPI Payment',card:'Credit / Debit Card',netbank:'Net Banking',cod:'Cash on Delivery',wa:'WhatsApp Pay'};
  return`${navHTML()}
<div class="conf-page">
  <span class="conf-icon">🎉</span>
  <h1 style="font-family:'Playfair Display',serif;font-size:2rem;color:var(--brown)">Order Confirmed!</h1>
  <p style="color:var(--text2);margin:.5rem 0 .8rem;line-height:1.7">Thank you for choosing Vidhatri Bio Enzyme Products. Your order has been received and is being prepared with love.</p>
  <div class="conf-id">${ord.id}</div>
  <p style="font-size:.75rem;color:var(--text3);margin-bottom:1.8rem">Save this order ID for tracking your delivery</p>

  <div class="conf-details">
    <div class="conf-row"><span>Order Date</span><strong>${new Date(ord.placed).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</strong></div>
    <div class="conf-row"><span>Expected Delivery</span><strong style="color:var(--g1)">${ord.estDelivery}</strong></div>
    <div class="conf-row"><span>Payment Method</span><strong>${payLabels[ord.payM]||ord.payM}</strong></div>
    <div class="conf-row"><span>Order Total</span><strong style="color:var(--g1)">₹${ord.tot}</strong></div>
    <div class="conf-row"><span>Delivery Address</span><strong>${a.fn} ${a.ln}, ${a.l1}, ${a.l2?a.l2+', ':''}${a.city} – ${a.pin}, ${a.state}</strong></div>
    <div class="conf-row"><span>Mobile</span><strong>${a.mob}</strong></div>
    ${a.note?`<div class="conf-row"><span>Instructions</span><strong>${a.note}</strong></div>`:''}
  </div>

  <div style="background:var(--cream2);border-radius:var(--r2);padding:1.2rem;margin:1.4rem 0;text-align:left">
    <p style="font-weight:800;color:var(--brown);margin-bottom:.7rem;font-family:'Playfair Display',serif">Items Ordered</p>
    ${ord.items.map(it=>`<div style="display:flex;align-items:center;gap:.65rem;padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.83rem"><span>${it.emoji}</span><span style="flex:1;color:var(--text2)">${it.name} (${it.vol}) × ${it.qty}</span><strong style="color:var(--g1)">₹${it.price*it.qty}</strong></div>`).join('')}
    <div style="display:flex;justify-content:space-between;font-weight:800;font-size:.9rem;margin-top:.7rem;color:var(--brown)"><span>Total Paid</span><span>₹${ord.tot}</span></div>
  </div>

  <div class="info-box green" style="margin-bottom:1.5rem;text-align:left">
    📱 A confirmation SMS and WhatsApp message with tracking details will be sent to <strong>${a.mob}</strong> shortly.
  </div>

  <div style="display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-green btn-lg" onclick="go('home')">🌿 Continue Shopping</button>
    <button class="btn btn-outline" onclick="toast('📞 Calling +91 83670 66110 for support')">📞 Need Help?</button>
  </div>

  <div class="info-box cream" style="margin-top:2rem;font-size:.77rem;text-align:left">
    🌱 <strong>Thank you for choosing chemical-free.</strong> Every Vidhatri purchase supports zero-waste fermentation, rescued ingredient sourcing, and sustainable production in India. You're making a real difference.
  </div>
</div>
${footerHTML()}`
}

/* ═══════════════════════════
   RENDER
═══════════════════════════ */
function render(){
  const app=document.getElementById('app');
  if(S.page==='home') app.innerHTML=homeHTML();
  else if(S.page==='product') app.innerHTML=productHTML();
  else if(S.page==='cart') app.innerHTML=cartHTML();
  else if(S.page==='payment') app.innerHTML=paymentHTML();
  else if(S.page==='confirm') app.innerHTML=confirmHTML();
}

/* Scroll nav effect */
window.addEventListener('scroll',()=>{
  const was=S.scrolled;S.scrolled=window.scrollY>50;
  if(was!==S.scrolled){
    const nav=document.querySelector('.nav');
    if(nav){nav.classList.toggle('scrolled',S.scrolled)}
  }
},{ passive:true });

render();
</script>
</body>
</html>
